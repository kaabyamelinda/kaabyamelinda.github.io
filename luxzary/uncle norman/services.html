<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cafe - Services</title>

    <style>
        .services {
            padding: 60px 20px;
            text-align: center;
            background: gold;
        }

        .section-title {
            font-size: 36px;
            margin-bottom: 40px;
            color:black;
        }

        .services-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .service-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .service-box:hover {
            transform: translateY(-5px);
        }

        .service-box img {
            width: 60px;
            margin-bottom: 15px;
        }

        .service-box h3 {
            margin-bottom: 10px;
            color: #222;
        }

        .service-box p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

<section class="services">

    <h1 class="section-title">Our Services</h1>

    <div class="services-container">

        <div class="service-box">
            <img src="images/coffee-icon.png" alt="Coffee Service">
            <h3>Fresh Coffee</h3>
            <p>We serve freshly brewed coffee made from high-quality beans every day.</p>
        </div>

        <div class="service-box">
            <img src="images/food-icon.png" alt="Food Service">
            <h3>Delicious Food</h3>
            <p>Enjoy tasty snacks and meals made with fresh ingredients.</p>
        </div>

        <div class="service-box">
            <img src="images/wifi-icon.png" alt="Free WiFi">
            <h3>Free WiFi</h3>
            <p>Stay connected with our fast and free internet.</p>
        </div>

        <div class="service-box">
            <img src="images/takeaway-icon.png" alt="Takeaway Service">
            <h3>Takeaway</h3>
            <p>Order your favorite coffee and food to go.</p>
        </div>

    </div>

</section>

</body>
</html>
