<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - My Cafe</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    background: linear-gradient(-45deg, #ffffff, #f8f5f2, #d2b48c, #c69c6d);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    color: #333;
}

/* ANIMATION */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CONTACT SECTION */
.contact-section {
    padding: 60px 10%;
    text-align: center;
}

.contact-section h1 {
    font-size: 40px;
    color: #6b3e26;
    margin-bottom: 10px;
}

.contact-section p {
    margin-bottom: 40px;
    font-size: 18px;
}

/* CONTACT BOXES */
.contact-boxes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: auto;
}

.contact-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.contact-box:hover {
    transform: translateY(-5px);
}

/* ICON STYLE */
.contact-box h3 {
    color: #6b3e26;
    margin-bottom: 10px;
}

.contact-box p {
    font-size: 16px;
}

/* SOCIAL LINKS */
.social-links {
    margin-top: 40px;
}

.social-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    background: #6b3e26;
    padding: 10px 15px;
    border-radius: 20px;
    display: inline-block;
    transition: 0.3s;
}

.social-links a:hover {
    background: #8b5a3c;
}

</style>
</head>

<body>

<section class="contact-section">

    <h1>Contact Us</h1>
    <p>We are always happy to hear from you!</p>

    <!-- CONTACT INFO -->
    <div class="contact-boxes">

        <div class="contact-box">
            <h3>📞 Phone</h3>
            <p>+256 705 499 793</p>
        </div>

        <div class="contact-box">
            <h3>📧 Email</h3>
            <p>loughandsmile@gmail.com</p>
        </div>

        <div class="contact-box">
            <h3>📍 Location</h3>
            <p>mbale, Uganda</p>
        </div>

    </div>

    <!-- SOCIAL MEDIA -->
    <div class="social-links">

        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">WhatsApp</a>

    </div>
    <section class="contact-section">

    <h1>Contact Us</h1>

    <p>We’d love to hear from you. Send us a message!</p>

    <form class="contact-form">

        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <input type="text" placeholder="Subject">

        <textarea placeholder="Your Message" rows="5" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</section>

</section>

</body>
</html>
